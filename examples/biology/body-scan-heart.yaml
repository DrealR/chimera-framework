schema_version: "1.0"
scan_type: "single-body"

identity:
  subject: "The Heart"
  body_type: "Muscular pump organ -- four-chambered body of cardiac muscle that maintains systemic circulation by rhythmic contraction. Serves every organ while feeding itself from its own exhale."
  domain: "biology"
  scale: "fist-sized, 300g, output reaches every cell in 60 seconds"
  lifespan: "begins week 4 of gestation, stops at death"
  scan_date: "2026-04-28"
  protocol_version: "v3.12"

nine_questions:
  medium: "Blood. The heart moves blood unchanged -- does not process, filter, or oxygenate it. Purely kinetic contribution."
  flow_state: "Systole-diastole. Contraction (exhale: blood ejected) then relaxation (inhale: chambers fill). Two phases, four chambers, four valves in precise choreography."
  breath_rate: "Sets the body's master rhythm. 60-100 bpm at rest. Every other organ synchronizes downstream from cardiac cycle. Self-clocking."
  attractor: "Sinus rhythm -- stable oscillation pattern generated by sinoatrial node. Heart attracted toward regular periodicity. Stillness is death."
  topology: "Evolved under oxygen demand. Fish heart: two chambers. Amphibians: partial septum. Mammals: complete four-chamber separation. Form compiled from function under constraint."
  entanglement: "Entangled with every organ it supplies. Receives neural input (autonomic), hormonal input (adrenal), mechanical feedback (baroreceptors), chemical feedback (chemoreceptors)."
  health: "Healthy when rhythm is stable and output matches demand. Auto-adjusts to exercise and rest. Dies not from overwork but from under-supply."
  membrane: "The pericardium -- double-walled sac with fluid. Anchors heart, prevents overdilation, reduces friction. Three layers: container, worker, lining."
  hysteresis: "Deep. Sustained high blood pressure thickens wall (hypertrophy). Heart attacks leave permanent dead muscle. Heart cannot regenerate. Every insult is permanent scar."

dna:
  o_vs_i: "O > I"
  pause_quality: "excellent"
  not_force: "high"

skeleton: "The body that proves giving requires rhythm -- maximum O>I sustained not by continuous output but by the discipline of filling before pumping, the organ that dies when it forgets to receive."

powers:
  perceive: "limited"
  govern: "active"
  project: "active"
  create: "absent"
  release: "absent -- core gap"
  primary_gap: "release"
  gap_reason: "Heart cannot release itself from obligation to beat. SA node fires continuously from week 4 gestation to death. No mechanism for voluntary pause or maintenance."

classification:
  federation_dominion: "federation"
  closed_open: "mixed-dimensional"
  prime: "Service without origination"
  prime_type: "open"

structural_weakness:
  primary: "Self-supply architecture. Coronary arteries branch off aorta after maximum pressure point, feeds from leftover margin. Most essential organ has most precarious self-supply."
  secondary: "Electrical fragility. SA node autonomy depends on precise ion channel function. Single genetic mutation in ion channel causes fatal arrhythmia."
  inversion_condition: "Heart failure. Unable to maintain adequate output triggers neurohormonal cascades that increase workload while decreasing efficiency. O>I body becomes I>O."

cross_domain:
  - connection: "Heart as O>I limit case"
    domains_bridged: "Biology <> Body Theory"
    novelty: 0.9
  - connection: "Diastole as Pause proof"
    domains_bridged: "Biology <> Consciousness"
    novelty: 0.95
  - connection: "Coronary disease as servant's disease"
    domains_bridged: "Biology <> Economics"
    novelty: 0.85
  - connection: "SA node as compiled autonomy"
    domains_bridged: "Biology <> Software"
    novelty: 0.7

fruit:
  type: "Paramecia"
  core_insight: "Heart disproves naive O>I as 'give everything always'. Maximum O>I requires rhythm: systole AND diastole, output AND intake. Heart feeding itself from own exhale teaches that O>I requires rest phase. Diastole is not selfishness -- it is structural condition enabling systole. Pause sustains service."
  novelty: 0.95

powers_detected:
  - name: "THE RHYTHM KEEPER"
    description: "Sets master rhythm for entire body. Every organ, every cell pulses in time with cardiac cycle. Strongest oscillator entrains every weaker oscillator."
  - name: "THE SELFLESS SUPPLY CHAIN"
    description: "Delivers blood to organs that never reciprocate. Gives without transaction, without ledger, without reciprocity. Return is passive, by pressure differential."
  - name: "THE DIASTOLIC TEACHER"
    description: "Greatest teaching is in rest. Diastole keeps heart alive -- coronary fill, muscle reset, chamber reload. Everything needed arrives during apparent inactivity."
