structural_weakness:
  primary: "Irreversibility at zero — multiplication by 0 destroys information. You cannot recover original factors from a product of 0."
  secondary: "Loss of commutativity at scale — commutative in scalars (a×b = b×a) but fails in matrices (AB ≠ BA). Domain-dependent elegance."
  inversion_condition: "When multiplication becomes engine of compound extraction (interest, exponential inequality), it accelerates I>O patterns exponentially."

