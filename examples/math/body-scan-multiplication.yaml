    description: "Multiplication creates relationships between numbers addition cannot see. Through multiplication, 2 and 3 are CO-CREATORS of 6."
  - name: "THE SHAPESHIFTER"
    description: "Multiplication changes its own rules to fit the dimension. Commutative in scalars, non-commutative in matrices, rotation in complex numbers."
