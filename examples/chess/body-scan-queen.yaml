powers_detected:
  - name: "THE TEMPTATION"
    description: "Creates attentional gravity well pulling toward premature action; resisting is first test of chess consciousness"
  - name: "THE AMPLIFIER"
    description: "Multiplies whatever position contains; high C + queen = domination, low C + queen = catastrophe"
  - name: "THE SACRIFICE"
    description: "Carries chess's most dramatic Release; strongest asset sometimes worth more given away than held"
