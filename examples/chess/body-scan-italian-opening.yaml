fruit:
  type: "Paramecia"
  core_insight: "The Italian proves principles are not training wheels. Every beginner learns it because its moves follow the rules. Most intermediates abandon it, assuming 'real' openings must be more complex. Masters return to it, discovering the rules were not simplified approximations — they were the actual load-bearing structure. Sophistication does not require obscurity."
  novelty: 0.85

powers_detected:
  - name: "THE TEACHER"
    description: "The Italian is the opening that teaches opening play by being opening play. It does not approximate principles — it embodies them. A student executing it is not studying principles abstractly but seeing the consequences on the board."
  - name: "THE GATE"
    description: "Three moves in, dozens of worlds branch. The Italian is a gate body — a narrow passage opening into a vast interior. The gate's power is compression: maximum shared history, maximum divergent future."
  - name: "THE SURVIVOR"
    description: "Four centuries of continuous play. Declared obsolete, bypassed, dismissed — and still standing, still producing ideas, still played at the world championship level. The Italian survives because its foundation is structural, not fashionable."
