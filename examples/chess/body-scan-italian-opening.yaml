nine_questions:
  medium: "Principle-space. The Italian flows through the dimension of classical opening principles — control the center, develop a piece toward the center, develop another piece to an active square."
  flow_state: "inhale"
  breath_rate: "moderate"
  attractor: "f7 — the weakest point in Black's starting position, defended only by the king. The entire opening gravitates toward this target."
  topology: "designed"
  entanglement: "maximum"
  health: "healthy"
  membrane: "semi-permeable"
  hysteresis: "The scar of being labeled 'too obvious.' For much of the 20th century, top players abandoned it for the Ruy Lopez. The Italian was called the beginner's opening, but the depth was always there beneath the prejudice against simplicity."

dna:
  o_vs_i: "mixed-operational"
  pause_quality: "strong"
  not_force: "moderate"

skeleton: "The Italian is the opening that teaches by being obvious — every move follows a principle, and the depth hides not in the moves themselves but in the branching consequences of following principles to their logical endpoints."

powers:
  perceive: "active"
  govern: "active"
  project: "active"
  create: "moderate"
  release: "weak"
  primary_gap: "release"
  gap_reason: "The Italian builds pressure without providing a native mechanism for detonation. The center tension persists until one player forces a break. It risks stagnation if the potential energy never converts to kinetic energy."

classification:
  federation_dominion: "federation"
  closed_open: "mixed"
  prime: "Principled development through f7-targeting geometry"
  prime_type: "open"

structural_weakness:
  primary: "Predictability. The Italian announces its intentions from move three. Bc4 tells Black exactly where White is looking — the a2-g8 diagonal and f7. A prepared opponent can defend efficiently."
  secondary: "Central tension dependency. The Italian's power rests on maintaining e4-e5 pawn tension. If Black resolves this favorably, the infrastructure loses its load-bearing wall and Bc4 becomes less relevant."
  inversion_condition: "When the Italian drifts into passivity. In Pianissimo lines where White never finds a break, the opening degenerates from principled building into aimless maneuvering. Potential energy never converts to kinetic energy."

