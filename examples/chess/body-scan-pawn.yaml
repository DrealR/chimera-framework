  - connection: "Pawn structure as compiled history"
    domains_bridged: "Chess <> Information Theory"
    novelty: 0.8
  - connection: "Isolated pawn as federation failure"
    domains_bridged: "Chess <> Social Systems"
    novelty: 0.8
  - connection: "Forward-only constraint as gravity chamber"
    domains_bridged: "Chess <> Body Theory"
    novelty: 0.9

fruit:
  type: "Zoan"
  core_insight: "Capacity to transform belongs to the body that cannot go back, not to the body that can go anywhere. Constraint enables change; freedom alone does not."
  novelty: 0.9

powers_detected:
  - name: "THE ARCHITECT"
    description: "Builds the position's skeleton; all other pieces' strength is defined by pawn structure"
  - name: "THE CHRYSALIS"
    description: "Promotion is true metamorphosis -- pawn ceases to exist and new piece appears, not mere enhancement"
  - name: "THE LOCK"
    description: "Every advance permanently locks position in new configuration through irreversible structural commitment"
