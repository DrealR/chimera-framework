skeleton: "The only body on the board that trades its own identity for power -- proving that irreversible forward commitment, not raw strength, is what transforms a position and a life."

powers:
  perceive: "weak"
  govern: "strong"
  project: "active"
  create: "exceptional"
  release: "absent"
  primary_gap: "release"
