fruit:
  type: "Mythical Zoan"
  core_insight: "The game proves that O>I is not a moral preference but a structural strategy. Anderssen sacrificed because sacrifice purchased the only thing that mattered: convergent force on the king. The Immortal Game is not a parable about generosity; it is an engineering proof that directed output defeats undirected input when the directing body has compiled sufficient vision to aim."
  novelty: 0.9

powers_detected:
  - name: "THE SCULPTOR"
    description: "Anderssen removed everything that was not checkmate. Two rooks, a bishop, a queen — carved away until only the mating pattern remained. The checkmate was always inside the position. The sacrifices were the chisel."
  - name: "THE NAMER"
    description: "Falkbeer's act of naming transformed a casual London game into a permanent cultural body. The name 'Immortal' is not a description but a creation. The game became immortal because it was called immortal, and then justified the name by enduring 175 years of scrutiny."
  - name: "THE PROOF"
    description: "The game functions as a mathematical proof of a philosophical claim. Claim: directed giving beats undirected taking. Proof: Anderssen vs Kieseritzky, 1851. The proof has imperfections, but the theorem has been validated across every subsequent era."
