identity:
  subject: "The Immortal Game"
  body_type: "Interaction body — Anderssen vs Kieseritzky, London, June 21, 1851. King's Gambit Accepted. 23 moves."
  domain: "chess"
  scale: "local"
  lifespan: "eternal"
  scan_date: "2026-04-28"
  protocol_version: "v3.11"

nine_questions:
  medium: "Initiative-space. Material flows out; initiative flows in. The medium is tempo wielded as a weapon."
  flow_state: "exhale"
  breath_rate: "fast"
  attractor: "The black king. Every move from 15 onward bends toward Kd8/Ke8. The attractor is the king itself, stripped of defenders by the very material Black accumulated."
  topology: "flowing"
  entanglement: "high"
  health: "healthy"
  membrane: "semi-permeable"
  hysteresis: "Two scars. First: Romantic-era chess valued beauty, framing the game as brilliant but unsound when positional chess arrived. Second: Kieseritzky published it as casual, denying it institutional weight despite its immortality emerging anyway."

dna:
  o_vs_i: "O>I"
  pause_quality: "strong"
  not_force: "moderate"

skeleton: "The Immortal Game is the proof that a body which gives everything away for structural purpose defeats a body that accumulates everything without structural purpose. Twenty-five points of material sacrificed, checkmate delivered with three pieces."

powers:
  perceive: "active"
  govern: "active"
  project: "active"
  create: "strong"
  release: "active"
  primary_gap: "none"
  gap_reason: "All five powers present and coordinated in one player, absent in the other. The gap is between the two players, not within the game-body itself."

classification:
  federation_dominion: "federation"
  closed_open: "mixed"
  prime: "Sacrifice as directed investment, not loss"
  prime_type: "closed"

structural_weakness:
  primary: "The game is not objectively sound. Modern engines find defensive resources for Black around moves 19-20. The game demonstrates a principle through an imperfect example."
  secondary: "Romantic-era bias. The game's immortality was partly constructed by a chess culture that valued sacrificial attacks above all else. This is a curated peak, not a random demonstration."
  inversion_condition: "When sacrifices are not aimed. Without targeting, sacrifice is not O>I — it is waste. Imitators copying output without compiling input are not giving purposefully; they are hemorrhaging."

