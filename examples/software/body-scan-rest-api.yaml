# --- POWERS DETECTED ---
powers_detected:
  - name: "THE AMNESIAC"
    description: "Deliberate refusal of memory as architectural strategy -- forgetting every client after every response enables replacement, replication, and scaling without coordination"
  - name: "THE UNIFORM"
    description: "Radical compression of all operations to a handful of standard verbs on nouns -- enabling intermediary visibility and optimization without domain knowledge"
