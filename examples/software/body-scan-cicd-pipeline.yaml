  novelty: 0.85

# --- POWERS DETECTED ---
powers_detected:
  - name: "THE GATEKEEPER"
    description: "Stands between code and production, admitting only what passes verification — structural refusal that cannot be persuaded, only reconfigured"
  - name: "THE STANDARDIZER"
    description: "Eliminates 'works on my machine' by defining a single canonical environment where truth is determined — consensus through infrastructure"
  - name: "THE MIRROR"
    description: "Reflects the organization's actual engineering practices with unflinching accuracy — coverage, build times, and failure rates reveal what self-reporting hides"
