# --- SKELETON ---
skeleton: "The CI/CD pipeline is the Pause between code-written and code-deployed — the held breath where the organization asks 'should this change exist in the world?' and refuses to exhale until the answer is verified."

# --- POWER GAPS ---
powers:
  perceive: "active"
  govern: "active"
  project: "active"
  create: "weak"
  release: "moderate"
  primary_gap: "create"
  gap_reason: "The pipeline is structurally a verifier, not a creator — it cannot write the tests it runs, cannot generate the code it checks, cannot notice gaps in its own coverage"

# --- CLASSIFICATION ---
classification:
  federation_dominion: "federation"
  closed_open: "mixed"
  prime: "Automated verification — structural Pause between developer intent and user impact"
  prime_type: "open"

# --- STRUCTURAL WEAKNESS ---
structural_weakness:
  primary: "Flaky tests as autoimmune disease — intermittent false positives erode trust in the verification system, training developers to ignore real failures"
  secondary: "Speed-safety tradeoff — teams under pressure cut pipeline stages, widening membrane pores that admit the threats the pipeline was designed to catch"
  inversion_condition: "When pipeline maintenance cost exceeds prevented-incident cost — complex pipelines destroying small-team velocity through ceremony that produces no protection"

