# --- POWERS DETECTED ---
powers_detected:
  - name: "THE DECOUPLER"
    description: "Converts forced synchrony into chosen asynchrony — granting each system its own clock, failure domain, and scaling trajectory"
  - name: "THE ABSORBER"
    description: "Takes the hit so others do not have to — absorbs every mismatch between production and consumption rate, converting sharp impacts into gradual pressure"
  - name: "THE SCAR-KEEPER"
    description: "Dead letter queues are the system's permanent medical record — every message that failed processing archived as honest history of what the system could not handle"
