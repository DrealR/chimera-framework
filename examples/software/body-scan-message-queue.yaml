# --- SKELETON ---
skeleton: "The body that is nothing but Pause — a held breath between two systems, proving that the most resilient architecture is built from deliberate separation, not faster connections."

# --- POWER GAPS ---
powers:
  perceive: "absent"
  govern: "strong"
  project: "moderate"
  create: "strong"
  release: "moderate"
  primary_gap: "Perceive"
  gap_reason: "The queue is semantically blind — it carries messages whose content could save or destroy the system and cannot read a single one. Blindness is by design but the gap is structural and permanent."

# --- CLASSIFICATION ---
classification:
  federation_dominion: "federation"
  closed_open: "mixed"
  prime: "Temporal buffer that converts coupling into independence"
  prime_type: "open"

# --- STRUCTURAL WEAKNESS ---
structural_weakness:
  primary: "Converts visible coupling into invisible coupling — the buffer hides failure, making the system look healthy from both ends while the queue silently fills with unprocessed intent"
  secondary: "Message format is a frozen contract — schema changes require coordinating every consumer, displacing tight coupling from runtime to deployment time"
  inversion_condition: "When operational complexity exceeds the coupling complexity it replaced, or during consumer starvation where the queue becomes an unbounded append-only log consuming resources while producing nothing"

