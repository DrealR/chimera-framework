# --- FRUIT ---
fruit:
  type: "Paramecia"
  core_insight: "Disposability is a form of durability. The most resilient architecture is one where every component is designed to be thrown away -- immortality of pattern, not of instance."
  novelty: 0.9

# --- POWERS DETECTED ---
powers_detected:
  - name: "THE MEMBRANE"
    description: "Boundary enforcement -- separating inside from outside on shared physical substrate, making both sides behave as if the other does not exist."
  - name: "THE REPLICA"
    description: "Unlimited identical instantiation from a single image -- existence as pattern rather than instance, making individual bodies expendable."
  - name: "THE AMNESIAC"
    description: "Total forgetting on death -- no runtime state persists, every launch is a clean birth unburdened by accumulated errors of previous lives."
