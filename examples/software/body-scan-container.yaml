  gap_reason: "The container generates nothing not specified in its image. Creativity would mean drift; drift would mean unreproducibility. The gap is load-bearing -- it sacrifices creation for predictability."

# --- CLASSIFICATION ---
classification:
  federation_dominion: "federation-leaning"
