# --- STRUCTURAL WEAKNESS ---
structural_weakness:
  primary: "Illusion of isolation -- namespace boundary is policy enforced by shared kernel, not a true wall. Kernel exploit collapses all containers simultaneously."
  secondary: "Image supply chain poisoning -- base image vulnerabilities propagate faithfully through every container built on top of them."
  inversion_condition: "Container sprawl exceeding organizational capacity to manage -- operational cost of maintaining fleet exceeds the cost it was designed to eliminate."

